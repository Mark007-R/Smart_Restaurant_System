{% extends "base.html" %}
{% block content %}

<style>
  .auth-container {
    max-width: 550px;
    margin: 2rem auto;
    padding: 0;
  }

  .auth-card {
    background: rgba(17, 28, 47, 0.95);
    backdrop-filter: blur(20px);
    border-radius: 2rem;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    border: 1px solid rgba(255, 255, 255, 0.1);
    overflow: hidden;
    animation: fadeInUp 0.6s ease;
  }

  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(30px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .auth-header {
    background: linear-gradient(135deg, #f59e0b 0%, #f97316 100%);
    padding: 2.5rem 2rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .auth-header::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255, 255, 255, 0.2) 0%, transparent 70%);
    animation: rotate 20s linear infinite;
  }

  @keyframes rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .auth-header h2 {
    color: #fff;
    font-weight: 800;
    font-size: 2rem;
    margin: 0;
    position: relative;
    z-index: 1;
  }

  .auth-header i {
    font-size: 3rem;
    color: #fff;
    margin-bottom: 1rem;
    position: relative;
    z-index: 1;
  }

  .auth-body {
    padding: 2.5rem 2rem;
  }

  .form-group {
    margin-bottom: 1.5rem;
  }

  .form-label {
    color: #e2e8f0;
    font-weight: 600;
    margin-bottom: 0.6rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .form-label i {
    color: #f59e0b;
  }

  .form-control {
    background: rgba(30, 41, 59, 0.8);
    border: 2px solid rgba(255, 255, 255, 0.1);
    border-radius: 1rem;
    color: #e2e8f0;
    padding: 0.9rem 1.2rem;
    font-size: 1rem;
    transition: all 0.3s ease;
  }

  .form-control:focus {
    background: rgba(30, 41, 59, 0.95);
    border-color: #f59e0b;
    box-shadow: 0 0 0 0.2rem rgba(245, 158, 11, 0.25);
    color: #fff;
  }

  .form-control::placeholder {
    color: #64748b;
  }

  .role-selector {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .role-option {
    position: relative;
  }

  .role-option input[type="radio"] {
    position: absolute;
    opacity: 0;
  }

  .role-label {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.5rem 1rem;
    background: rgba(30, 41, 59, 0.5);
    border: 2px solid rgba(255, 255, 255, 0.1);
    border-radius: 1rem;
    cursor: pointer;
    transition: all 0.3s ease;
    text-align: center;
  }

  .role-label i {
    font-size: 2.5rem;
    margin-bottom: 0.8rem;
    color: #94a3b8;
    transition: all 0.3s ease;
  }

  .role-label .role-title {
    color: #e2e8f0;
    font-weight: 700;
    font-size: 1.1rem;
    margin-bottom: 0.3rem;
  }

  .role-label .role-desc {
    color: #64748b;
    font-size: 0.85rem;
  }

  .role-option input[type="radio"]:checked + .role-label {
    background: linear-gradient(135deg, rgba(245, 158, 11, 0.2) 0%, rgba(249, 115, 22, 0.15) 100%);
    border-color: #f59e0b;
    box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1);
  }

  .role-option input[type="radio"]:checked + .role-label i {
    color: #f59e0b;
    transform: scale(1.1);
  }

  .role-label:hover {
    border-color: rgba(245, 158, 11, 0.5);
    transform: translateY(-2px);
  }

  .btn-signup {
    background: linear-gradient(135deg, #f59e0b 0%, #f97316 100%);
    border: none;
    border-radius: 1rem;
    color: #fff;
    padding: 1rem 2rem;
    font-size: 1.1rem;
    font-weight: 700;
    width: 100%;
    margin-top: 1rem;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4);
    cursor: pointer;
  }

  .btn-signup:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(245, 158, 11, 0.6);
  }

  .btn-signup:active {
    transform: translateY(0);
  }

  .auth-footer {
    text-align: center;
    padding: 1.5rem 2rem 2rem;
    color: #94a3b8;
    border-top: 1px solid rgba(255, 255, 255, 0.05);
  }

  .auth-footer a {
    color: #f59e0b;
    text-decoration: none;
    font-weight: 600;
    transition: color 0.3s ease;
  }

  .auth-footer a:hover {
    color: #f97316;
    text-decoration: underline;
  }

  .password-toggle {
    position: relative;
  }

  .password-toggle-btn {
    position: absolute;
    right: 1rem;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: #94a3b8;
    cursor: pointer;
    padding: 0.5rem;
    transition: color 0.3s ease;
  }

  .password-toggle-btn:hover {
    color: #f59e0b;
  }

  .password-strength {
    height: 4px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 2px;
    margin-top: 0.5rem;
    overflow: hidden;
  }

  .password-strength-bar {
    height: 100%;
    width: 0;
    transition: all 0.3s ease;
    border-radius: 2px;
  }
</style>

<div class="auth-container">
  <div class="auth-card" data-aos="zoom-in">
    <div class="auth-header">
      <i class="fas fa-user-plus"></i>
      <h2>Create Account</h2>
    </div>
    
    <div class="auth-body">
      <form method="POST" action="{{ url_for('signup') }}" id="signupForm">
        <div class="form-group">
          <label class="form-label" for="username">
            <i class="fas fa-user"></i>
            Username
          </label>
          <input 
            type="text" 
            class="form-control" 
            id="username" 
            name="username" 
            placeholder="Choose a username (min 3 characters)" 
            required
            minlength="3"
            autocomplete="username"
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="email">
            <i class="fas fa-envelope"></i>
            Email Address
          </label>
          <input 
            type="email" 
            class="form-control" 
            id="email" 
            name="email" 
            placeholder="Enter your email address" 
            required
            autocomplete="email"
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="password">
            <i class="fas fa-lock"></i>
            Password
          </label>
          <div class="password-toggle">
            <input 
              type="password" 
              class="form-control" 
              id="password" 
              name="password" 
              placeholder="Create a strong password (min 6 characters)" 
              required
              minlength="6"
              autocomplete="new-password"
              oninput="checkPasswordStrength()"
            >
            <button type="button" class="password-toggle-btn" onclick="togglePassword('password', 'toggleIcon1')">
              <i class="fas fa-eye" id="toggleIcon1"></i>
            </button>
          </div>
          <div class="password-strength">
            <div class="password-strength-bar" id="strengthBar"></div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirm_password">
            <i class="fas fa-lock"></i>
            Confirm Password
          </label>
          <div class="password-toggle">
            <input 
              type="password" 
              class="form-control" 
              id="confirm_password" 
              name="confirm_password" 
              placeholder="Re-enter your password" 
              required
              autocomplete="new-password"
            >
            <button type="button" class="password-toggle-btn" onclick="togglePassword('confirm_password', 'toggleIcon2')">
              <i class="fas fa-eye" id="toggleIcon2"></i>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label mb-3">
            <i class="fas fa-user-tag"></i>
            Select Your Role
          </label>
          <div class="role-selector">
            <div class="role-option">
              <input type="radio" name="role" id="role_user" value="user" checked>
              <label for="role_user" class="role-label">
                <i class="fas fa-user"></i>
                <div class="role-title">User</div>
                <div class="role-desc">View and analyze restaurant reviews</div>
              </label>
            </div>
            
            <div class="role-option">
              <input type="radio" name="role" id="role_manager" value="manager">
              <label for="role_manager" class="role-label">
                <i class="fas fa-user-tie"></i>
                <div class="role-title">Manager</div>
                <div class="role-desc">Full access with management features</div>
              </label>
            </div>
          </div>
        </div>

        <button type="submit" class="btn-signup">
          <i class="fas fa-user-plus me-2"></i>
          Sign Up
        </button>
      </form>
    </div>

    <div class="auth-footer">
      Already have an account? 
      <a href="{{ url_for('login') }}">Login here</a>
    </div>
  </div>
</div>

<script>
  function togglePassword(inputId, iconId) {
    const passwordInput = document.getElementById(inputId);
    const toggleIcon = document.getElementById(iconId);
    
    if (passwordInput.type === 'password') {
      passwordInput.type = 'text';
      toggleIcon.classList.remove('fa-eye');
      toggleIcon.classList.add('fa-eye-slash');
    } else {
      passwordInput.type = 'password';
      toggleIcon.classList.remove('fa-eye-slash');
      toggleIcon.classList.add('fa-eye');
    }
  }

  function checkPasswordStrength() {
    const password = document.getElementById('password').value;
    const strengthBar = document.getElementById('strengthBar');
    
    let strength = 0;
    if (password.length >= 6) strength += 25;
    if (password.length >= 10) strength += 25;
    if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength += 25;
    if (/[0-9]/.test(password)) strength += 15;
    if (/[^A-Za-z0-9]/.test(password)) strength += 10;
    
    strengthBar.style.width = strength + '%';
    
    if (strength < 40) {
      strengthBar.style.background = '#ef4444';
    } else if (strength < 70) {
      strengthBar.style.background = '#f59e0b';
    } else {
      strengthBar.style.background = '#22c55e';
    }
  }

  // Form validation
  document.getElementById('signupForm').addEventListener('submit', function(e) {
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirm_password').value;
    
    if (password !== confirmPassword) {
      e.preventDefault();
      alert('Passwords do not match!');
      return false;
    }
  });
</script>

{% endblock %}
